<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Our Love 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:'Cormorant Garamond', serif;
  overflow-x:hidden;
}

/* FILM EFFECT */
body::after {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://i.imgur.com/o7P3R6E.png");
  opacity:0.2;
  pointer-events:none;
}

/* TITLE */
h1 {
  text-align:center;
  font-family:'Great Vibes', cursive;
  font-size:45px;
  margin-top:20px;
}

/* SLIDER */
.slide {
  display:none;
  position:relative;
}

.slide img {
  width:100%;
  height:70vh;
  object-fit:cover;
}

.active {
  display:block;
}

.text {
  position:absolute;
  bottom:20%;
  width:100%;
  text-align:center;
  font-size:30px;
  font-family:'Great Vibes', cursive;
}

/* HEARTS */
.heart {
  position:fixed;
  z-index:999;
  animation:float 6s linear infinite;
}

@keyframes float {
  from { transform:translateY(100vh); opacity:1;}
  to { transform:translateY(-10vh); opacity:0;}
}

/* SECTION */
.section {
  padding:40px;
  text-align:center;
}

/* PLACE (RENKSİZ AMA ŞIK) */
.place {
  font-size:25px;
  margin:15px;
}

/* LETTERS */
.letters span {
  font-size:45px;
  cursor:pointer;
  margin:10px;
}

#message {
  margin-top:20px;
  font-size:22px;
  font-family:'Great Vibes', cursive;
}
</style>
</head>

<body>

<audio id="music" loop>
<source src="muzik.mp3">
</audio>

<h1>Rupesh & Hira 🤍</h1>

<!-- SLIDER -->
<div class="slide active">
<img src="IMG_20260611_143512.jpg">
<div class="text">You are my peace 🤍</div>
</div>

<div class="slide">
<img src="IMG_20260611_143625.jpg">
<div class="text">Happy Birthday my squirrel 🐿️</div>
</div>

<div class="slide">
<img src="IMG_20260611_143649.jpg">
<div class="text">I love you more every day 💖</div>
</div>

<!-- PLACES (STYLISH TEXT) -->
<div class="section">
<h2>Places We Will Go 🌍</h2>

<div class="place">Finland ❄️</div>
<div class="place">Maldives 🌊</div>
<div class="place">France 🗼</div>
<div class="place">Switzerland 🏔️</div>
<div class="place">Japan 🌸</div>

</div>

<!-- LETTER SURPRISE -->
<div class="section">
<h2>Open a Letter 💌</h2>

<div class="letters">
<span onclick="showMessage()">💌</span>
<span onclick="showMessage()">💌</span>
<span onclick="showMessage()">💌</span>
<span onclick="showMessage()">💌</span>
<span onclick="showMessage()">💌</span>
</div>

<div id="message"></div>
</div>

<script>

/* MUSIC */
document.body.addEventListener("click",()=>{
document.getElementById("music").play();
});

/* SLIDER */
let slides=document.querySelectorAll(".slide");
let i=0;

setInterval(()=>{
slides[i].classList.remove("active");
i=(i+1)%slides.length;
slides[i].classList.add("active");
},4000);

/* HEARTS (KESİN ÇALIŞIR) */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(20+Math.random()*20)+"px";
document.body.appendChild(h);

setTimeout(()=>h.remove(),6000);
},200);

/* FULL SENİN SÖZLER */
let messages=[
"They say perfection doesn't exist, but then I look at you and realize they are wrong.",
"I look at you and see the rest of my life in your eyes.",
"You are my safe haven in this chaotic world, and being in your arms feels like home.",
"My heart is, and always will be, yours.",
"You are the best thing that has ever been mine.",
"Sometimes I look at you and wonder how I got so lucky to have someone who heals my soul just by existing.",
"You became the calm to my storm, the light in my darkest nights, and the melody my heart always sings."
];

function showMessage(){
let random=messages[Math.floor(Math.random()*messages.length)];
document.getElementById("message").innerText=random;
}

</script>

</body>
</html>
