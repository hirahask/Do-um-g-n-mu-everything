<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Our Love Story 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: black;
  color: white;
  overflow-x: hidden;
}

/* FILM EFFECT */
body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('https://i.imgur.com/8KZtK0p.png');
  opacity: 0.2;
}

/* HEADER */
.header {
  text-align: center;
  font-size: 40px;
  padding: 20px;
  font-family: 'Great Vibes', cursive;
}

/* SLIDER */
.slide {
  display: none;
  position: relative;
}

.slide img {
  width: 100%;
  height: 70vh;
  object-fit: cover;
}

.active {
  display: block;
}

.text {
  position: absolute;
  bottom: 20%;
  width: 100%;
  text-align: center;
  font-size: 26px;
  font-family: 'Great Vibes', cursive;
}

/* HEARTS */
.heart {
  position: fixed;
  animation: float 5s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); opacity:1;}
  to { transform: translateY(-10vh); opacity:0;}
}

/* SECTION */
.section {
  padding: 40px;
  text-align: center;
}

/* PLACES */
.place {
  margin: 20px;
}
.place img {
  width: 90%;
  border-radius: 15px;
}

/* LETTERS */
.letters span {
  font-size: 40px;
  cursor: pointer;
  margin: 10px;
}

/* MESSAGE BOX */
#message {
  margin-top: 20px;
  font-size: 20px;
  font-family: 'Great Vibes', cursive;
}
</style>
</head>

<body>

<audio id="music" loop>
<source src="muzik.mp3">
</audio>

<div class="header">Rupesh & Hira 🤍</div>

<!-- SLIDER -->
<div class="slide active">
<img src="IMG_20260611_143512.jpg">
<div class="text">You are my peace 💖</div>
</div>

<div class="slide">
<img src="IMG_20260611_143625.jpg">
<div class="text">Happy Birthday my squirrel 🐿️</div>
</div>

<div class="slide">
<img src="IMG_20260611_143649.jpg">
<div class="text">I love you more every day 🤍</div>
</div>

<!-- PLACES -->
<div class="section">
<h2>Places We Will Go 🌍</h2>

<div class="place">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Lapland_Finland.jpg">
<p>Finland</p>
</div>

<div class="place">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/0f/Maldives_Island.jpg">
<p>Maldives</p>
</div>

<div class="place">
<img src="https://upload.wikimedia.org/wikipedia/commons/e/e6/Paris_Night.jpg">
<p>France</p>
</div>

<div class="place">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3f/Zermatt_Switzerland.jpg">
<p>Switzerland</p>
</div>

<div class="place">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6e/Tokyo_Tower.jpg">
<p>Japan</p>
</div>

</div>

<!-- LETTER SURPRISE -->
<div class="section">
<h2>Open a Letter 💌</h2>

<div class="letters">
<span onclick="showMessage()">💌</span>
<span onclick="showMessage()">💌</span>
<span onclick="showMessage()">💌</span>
<span onclick="showMessage()">💌</span>
<span onclick="showMessage()">💌</span>
</div>

<div id="message"></div>
</div>

<script>

/* MUSIC */
document.body.addEventListener("click", () => {
  document.getElementById("music").play();
});

/* SLIDER */
let slides = document.querySelectorAll(".slide");
let index = 0;

setInterval(() => {
  slides[index].classList.remove("active");
  index = (index + 1) % slides.length;
  slides[index].classList.add("active");
}, 4000);

/* HEARTS */
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💖";
  heart.style.left = Math.random()*100 + "vw";
  heart.style.fontSize = (20 + Math.random()*20) + "px";
  document.body.appendChild(heart);

  setTimeout(()=>heart.remove(),5000);
},300);

/* LETTER MESSAGES */
let messages = [
"They say perfection doesn't exist, but then I look at you and realize they are wrong.",
"I look at you and see the rest of my life in your eyes.",
"You are my safe haven in this chaotic world.",
"My heart is, and always will be, yours.",
"You are the best thing that has ever been mine.",
"Sometimes I wonder how I got so lucky to have you.",
"You became the calm to my storm."
];

function showMessage() {
  let random = messages[Math.floor(Math.random()*messages.length)];
  document.getElementById("message").innerText = random;
}

</script>

</body>
</html>
